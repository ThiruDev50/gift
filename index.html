  <style>
wedding-hero {
  display: block;
  position: relative;
}
.hero {
  --gold: #c9a227;
  --gold-soft: #e8cf7e;
  --maroon: #5b1220;
  --cream: #fdf6e9;
  position: relative;
  height: 220vh;  
}
.hero__stage {
  position: sticky;
  top: 0;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}
.hero__bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  transform: scale(1.05);
  z-index: 1;
}
.hero__bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    120% 80% at 50% 30%,
    rgba(0, 0, 0, 0) 40%,
    rgba(10, 5, 6, 0.5) 100%
  );
}
.hero__glow {
  position: absolute;
  left: 50%;
  top: 46%;
  width: 60vmin;
  height: 60vmin;
  transform: translate(-50%, -50%);
  background: radial-gradient(
    circle,
    rgba(233, 207, 126, 0.55) 0%,
    rgba(201, 162, 39, 0.25) 35%,
    rgba(201, 162, 39, 0) 70%
  );
  opacity: 0.25;
  z-index: 2;
  pointer-events: none;
  mix-blend-mode: screen;
}
.hero__content {
  position: absolute;
  left: 50%;
  top: 6%;
  transform: translateX(-50%);
  z-index: 6;
  text-align: center;
  color: var(--cream);
  padding: 0 20px;
  max-width: min(92vw, 640px);
  text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6);
}
.hero__eyebrow {
  font-family: "Marcellus", serif;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  font-size: clamp(0.7rem, 2.6vw, 0.9rem);
  color: #f3e3b8;
  text-shadow:
    0 2px 10px rgba(10, 6, 4, 0.9),
    0 0 4px rgba(10, 6, 4, 0.85),
    0 1px 2px rgba(0, 0, 0, 0.6);
  margin-bottom: 0.6rem;
}
.hero__names {
  font-family: "Marcellus", serif;
  font-size: clamp(2.2rem, 9vw, 5rem);
  line-height: 1.02;
  font-weight: 400;
}
.hero__amp {
  display: block;
  font-family: "Cormorant Garamond", serif;
  font-style: normal;
  font-weight: 700;
  font-size: clamp(1.1rem, 3.4vw, 1.8rem);
  letter-spacing: 0.14em;
  text-transform: lowercase;
  color: var(--cream);
  margin: 0.1em 0;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.85), 0 0 3px rgba(0, 0, 0, 0.7);
}
@media (min-width: 768px) {
  .hero__amp {
    font-size: clamp(2.6rem, 4.4vw, 3.8rem);
  }
}
.hero--married .hero__eyebrow {
  display: none;  
}
.hero--married .hero__countdown {
  bottom: 22%;
  background: none;
  border: none;
  backdrop-filter: none;
  padding: 0;
  border-radius: 0;
}
.hero__married-caption {
  margin: 0;
  text-align: center;
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-weight: 700;
  font-size: clamp(1.35rem, 4.6vw, 2.1rem);
  letter-spacing: 0.02em;
  color: #f6ecd6;
  text-shadow: 0 2px 14px rgba(0, 0, 0, 0.8), 0 0 4px rgba(0, 0, 0, 0.6);
  white-space: nowrap;
}
.hero--married .hero__amp {
  display: inline-block;
  font-family: "Cormorant Garamond", "Marcellus", serif;
  font-style: italic;
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
  font-size: clamp(2.6rem, 10vw, 5.6rem);
  line-height: 1;
  margin: 0 0.15em;
  vertical-align: baseline;
  color: var(--gold-soft, #e9cf7e);
}
.hero--married .hero__names {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.05em;
}
.hero__meta {
  margin-top: 0.9rem;
  font-size: clamp(0.8rem, 3vw, 1.05rem);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #f6ecd6;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.75);
}
.hero__venue {
  margin-top: 0.4rem;
  font-family: "Josefin Sans", sans-serif;
  font-weight: 400;
  font-size: clamp(0.82rem, 2.6vw, 1.05rem);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #fbf1d8;
  text-shadow: 0 1px 12px rgba(0, 0, 0, 0.85), 0 0 2px rgba(0, 0, 0, 0.6);
}
.hero__details {
  display: inline-block;
  margin-top: 0.9rem;
  padding: 12px clamp(20px, 5vw, 38px) 14px;
  border-radius: 18px;
  background: radial-gradient(
    120% 130% at 50% 50%,
    rgba(18, 10, 12, 0.58) 0%,
    rgba(18, 10, 12, 0.34) 55%,
    rgba(18, 10, 12, 0) 100%
  );
  backdrop-filter: blur(2px);
}
.hero__details .hero__meta {
  margin-top: 0;
}
.hero__countdown {
  position: absolute;
  left: 50%;
  bottom: 14%;
  transform: translateX(-50%);
  z-index: 7;
  display: flex;
  flex-wrap: wrap;               
  justify-content: center;
  align-items: center;
  gap: clamp(10px, 3.5vw, 26px);
  padding: 14px 18px;
  border-radius: 16px;
  background: rgba(20, 10, 12, 0.32);
  border: 1px solid rgba(233, 207, 126, 0.35);
  backdrop-filter: blur(6px);
  transition: opacity 0.35s ease;
}
.hero__when {
  flex-basis: 100%;
  margin: 0 0 6px;
  text-align: center;
  font-family: "Cinzel", "Marcellus", serif;
  font-weight: 600;
  font-size: clamp(0.72rem, 2.3vw, 0.9rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #f6ecd6;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.75), 0 0 2px rgba(0, 0, 0, 0.55);
  white-space: nowrap;
}
.countdown__cell {
  text-align: center;
  color: var(--cream);
  min-width: clamp(44px, 12vw, 68px);
}
.countdown__num {
  font-family: "Marcellus", serif;
  font-size: clamp(1.3rem, 6vw, 2.4rem);
  line-height: 1;
  color: #fff;
}
.countdown__label {
  display: block;
  margin-top: 4px;
  font-size: clamp(0.55rem, 2.2vw, 0.72rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-soft);
}
.hero__countdown--done {
  font-family: "Marcellus", serif;
  font-size: clamp(1rem, 5vw, 1.6rem);
  color: var(--gold-soft);
  letter-spacing: 0.05em;
}
.hero__married-msg {
  position: relative;
  z-index: 2;
  flex-basis: 100%;
  margin: 4px 0 2px;
  text-align: center;
  font-family: "Marcellus", "Cinzel", serif;
  font-size: clamp(1.1rem, 4.6vw, 1.7rem);
  letter-spacing: 0.04em;
  color: #fdf6e9;
  text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7), 0 0 3px rgba(0, 0, 0, 0.6);
}
.hero__countdown--done .hero__when {
  position: relative;
  z-index: 2;
}
.hero__figure {
  position: absolute;
  bottom: 4%;
  left: 50%;
  z-index: 4;
  height: clamp(220px, 48vh, 600px);
  width: auto;
  background: transparent;
  object-fit: contain;
  will-change: transform, opacity;
  filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.45));
}
.hero__figure--bride {
  z-index: 5;  
}
.hero__figure--groom {
  z-index: 4;
}
.hero__figure--together {
  z-index: 6;  
  opacity: 0;  
  transition: opacity 0.15s linear;
}
.hero__figure:not([src]) {
  visibility: hidden;
}
.hero__cue {
  position: absolute;
  left: 50%;
  bottom: 3%;
  transform: translateX(-50%);
  z-index: 8;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--gold-soft);
  font-family: "Marcellus", serif;
  letter-spacing: 0.2em;
  font-size: 0.7rem;
  text-transform: uppercase;
  transition: opacity 0.4s ease;
}
.hero__cue-arrow {
  width: 22px;
  height: 22px;
  border-right: 2px solid var(--gold-soft);
  border-bottom: 2px solid var(--gold-soft);
  transform: rotate(45deg);
  animation: hero-bob 1.8s ease-in-out infinite;
}
@keyframes hero-bob {
  0%,
  100% {
    transform: rotate(45deg) translate(0, 0);
    opacity: 0.4;
  }
  50% {
    transform: rotate(45deg) translate(4px, 4px);
    opacity: 1;
  }
}
@media (max-width: 640px) {
  .hero {
    height: 150vh;
  }
  .hero__figure {
    height: clamp(160px, 34vh, 300px);
    bottom: 6%;
  }
}
@media (min-width: 641px) and (max-width: 1024px) {
  .hero__figure {
    height: clamp(240px, 42vh, 460px);
  }
}
@media (prefers-reduced-motion: reduce) {
  .hero {
    height: 100vh;
  }
  .hero__cue-arrow {
    animation: none;
  }
}
</style>
  <style>
.book {
  position: relative;
  height: 170vh;
}
.book__stage {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2400px;
  perspective-origin: 50% 45%;
  overflow: hidden;
}
.book__halo {
  position: absolute;
  width: min(120vw, 1100px);
  height: min(120vw, 1100px);
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(233, 207, 126, 0.18) 0%,
    rgba(201, 162, 39, 0.08) 40%,
    rgba(201, 162, 39, 0) 70%
  );
  filter: blur(4px);
  pointer-events: none;
}
.book__book {
  position: relative;
  width: clamp(160px, 44vw, 380px);
  aspect-ratio: 1000 / 1500;
  transform-style: preserve-3d;
  will-change: transform;
}
.book__page--base {
  position: absolute;
  inset: 0;
  border-radius: 0 6px 6px 0;  
  background-color: #f3ecdd;
  overflow: hidden;
  transition: border-radius 260ms ease-out;
}
.book__leaf {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  transform-style: preserve-3d;
  transform-origin: left center;
  will-change: transform;
  z-index: 3;
}
.book__face {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background-color: #efe7d7;
  overflow: hidden;
  box-shadow: 0 30px 60px -25px rgba(40, 20, 25, 0.55),
    inset 0 0 0 1px rgba(255, 255, 255, 0.25);
}
.book__face--front {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-image: radial-gradient(
    120% 90% at 50% 20%,
    #f7efdd 0%,
    #ece0c6 55%,
    #e3d4b6 100%
  );
  transition: border-radius 260ms ease-out;
}
.book__face--front::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    90deg,
    rgba(40, 20, 25, 0.22) 0%,
    rgba(40, 20, 25, 0.05) 6%,
    rgba(40, 20, 25, 0) 14%
  );
  opacity: 1;
  transition: opacity 260ms ease-out;
}
.book__book.is-closed .book__face--front,
.book__book.is-closed .book__page--base {
  border-radius: 18px;
}
.book__book.is-closed .book__face--front::after {
  opacity: 0;
}
.book__face--back {
  transform: rotateY(180deg);
  border-radius: 6px 0 0 6px;  
  box-shadow: none;  
}
.book__spread-clip {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.book__spread {
  position: absolute;
  top: 0;
  height: 100%;
  width: 200%;
  max-width: none;
  display: block;
  object-fit: cover;
  object-position: center;
  user-select: none;
  -webkit-user-drag: none;
}
.book__page--base .book__spread {
  left: calc(-100% - 1px);
}
.book__face--back .book__spread {
  left: 0;
}
.book__spread-overlay {
  position: absolute;
  top: 0;
  left: -100%;
  width: 200%;
  height: 100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 220ms ease-out;
  z-index: 4;
  border-radius: 6px;
  overflow: hidden;
}
.book__spread-overlay img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
  user-select: none;
  -webkit-user-drag: none;
}
.book__spread-overlay.is-visible {
  opacity: 1;
}
.book__hint {
  position: absolute;
  bottom: clamp(16px, 4vh, 40px);
  left: 50%;
  transform: translateX(-50%);
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: clamp(0.85rem, 2.4vw, 1.05rem);
  letter-spacing: 0.04em;
  color: rgba(253, 246, 233, 0.75);
  text-align: center;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
@media (max-width: 640px) {
  .book {
    height: 160vh;
  }
  .book__book {
    width: 44vw;
    max-width: 340px;
  }
  .book__hint {
    font-size: 0.9rem;
  }
}
@media (prefers-reduced-motion: reduce) {
  .book {
    height: auto;
    padding: 8vh 0;
  }
  .book__stage {
    position: static;
    height: auto;
    perspective: none;
  }
  .book__leaf {
    transform: rotateY(-180deg) !important;
  }
}
</style>
  <style>
.ven {
  --ven-gold: #c9a227;
  --ven-gold-soft: #e9cf7e;
  --ven-cream: #fdf6e9;
  position: relative;
  padding: clamp(60px, 11vh, 130px) clamp(18px, 5vw, 64px);
  overflow: hidden;
}
.ven::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(80% 55% at 50% 18%, rgba(201, 162, 39, 0.14) 0%, rgba(201, 162, 39, 0) 60%),
    radial-gradient(90% 70% at 50% 100%, rgba(91, 18, 32, 0.35) 0%, rgba(91, 18, 32, 0) 65%);
}
.ven__inner {
  position: relative;
  max-width: 1080px;
  margin: 0 auto;
}
.ven__embers {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.ven__ember {
  position: absolute;
  bottom: -12px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff3cf 0%, var(--ven-gold-soft) 45%, rgba(201, 162, 39, 0) 72%);
  opacity: 0;
  animation: ven-ember-rise var(--ven-dur, 13s) linear var(--ven-delay, 0s) infinite;
}
@keyframes ven-ember-rise {
  0% { transform: translateY(0) translateX(0) scale(0.7); opacity: 0; }
  10% { opacity: 0.9; }
  50% { transform: translateY(-52vh) translateX(var(--ven-drift, 0)) scale(1); }
  90% { opacity: 0.75; }
  100% { transform: translateY(-104vh) translateX(0) scale(0.6); opacity: 0; }
}
.ven__head {
  text-align: center;
  margin-bottom: clamp(26px, 5vh, 54px);
}
.ven__eyebrow {
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-size: clamp(0.72rem, 2vw, 0.9rem);
  color: var(--ven-gold-soft);
}
.ven__title {
  font-family: "Marcellus", serif;
  font-size: clamp(1.9rem, 6vw, 3.1rem);
  letter-spacing: 0.04em;
  color: var(--ven-cream);
  margin: 0.14em 0 0.28em;
}
.ven__flourish {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  color: var(--ven-gold);
  font-size: clamp(0.9rem, 2.4vw, 1.15rem);
}
.ven__flourish::before,
.ven__flourish::after {
  content: "";
  width: clamp(44px, 13vw, 100px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ven-gold));
}
.ven__flourish::after {
  background: linear-gradient(90deg, var(--ven-gold), transparent);
}
.ven__timeline {
  position: relative;
  z-index: 1;
  padding: clamp(10px, 3vh, 28px) 0;
}
.ven__thread {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 24px;
  width: 2px;
  transform: translateX(-50%);
  background: linear-gradient(
    180deg,
    rgba(201, 162, 39, 0) 0%,
    rgba(201, 162, 39, 0.28) 8%,
    rgba(201, 162, 39, 0.28) 92%,
    rgba(201, 162, 39, 0) 100%
  );
}
.ven__thread-fill {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  transform-origin: top center;
  transform: scaleY(var(--ven-progress, 0));
  background: linear-gradient(
    180deg,
    var(--ven-gold-soft),
    var(--ven-gold)
  );
  box-shadow: 0 0 12px 1px rgba(233, 207, 126, 0.6);
  transition: transform 0.15s linear;
}
.ven__thread-spark {
  position: absolute;
  left: 50%;
  top: calc(var(--ven-progress, 0) * 100%);
  width: 14px;
  height: 14px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, #fff6dc 0%, var(--ven-gold-soft) 40%, rgba(201, 162, 39, 0) 72%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.ven__timeline.is-active .ven__thread-spark {
  opacity: 1;
}
.ven__flame {
  position: absolute;
  left: 50%;
  top: -12px;
  width: 10px;
  height: 16px;
  transform: translateX(-50%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: linear-gradient(180deg, #fff6dc 0%, var(--ven-gold-soft) 40%, #ff8a3d 85%, #e5561f 100%);
  box-shadow: 0 0 10px 2px rgba(255, 176, 80, 0.7);
  transform-origin: 50% 100%;
  animation: ven-flicker 1.1s ease-in-out infinite;
}
@keyframes ven-flicker {
  0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg); opacity: 0.95; }
  40% { transform: translateX(-52%) scaleY(1.18) scaleX(0.92) rotate(1.5deg); opacity: 1; }
  70% { transform: translateX(-48%) scaleY(0.9) scaleX(1.06) rotate(-1.5deg); opacity: 0.9; }
}
.ven__event {
  position: relative;
  padding-left: 64px;  
  margin-bottom: clamp(40px, 7vh, 78px);
  perspective: 900px;  
}
.ven__event:last-child {
  margin-bottom: 0;
}
.ven__node {
  position: absolute;
  left: 24px;
  top: 6px;
  width: 34px;
  height: 34px;
  transform: translate(-50%, 0) scale(0.4);
  opacity: 0;
  color: var(--ven-gold-soft);
  transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.ven__node svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.3;
  filter: drop-shadow(0 0 5px rgba(233, 207, 126, 0.55));
}
.ven__node::before {
  content: "";
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(233, 207, 126, 0.45) 0%, rgba(201, 162, 39, 0) 70%);
  opacity: 0;
  transform: scale(0.6);

    if (/Windows/i.test(ua)) return "Windows";
    if (/Mac OS X|Macintosh/i.test(ua)) return "macOS";
    if (/CrOS/i.test(ua)) return "ChromeOS";
    if (/Linux/i.test(ua)) return "Linux";
    return "Other";
  },
  _detectBrowser() {
    const ua = navigator.userAgent || "";
    let name = "Other";
    let version = "";
    if (/Edg\//.test(ua)) { name = "Edge"; version = /Edg\/([\d.]+)/.exec(ua)?.[1] || ""; }
    else if (/OPR\//.test(ua) || /Opera/.test(ua)) { name = "Opera"; version = /(?:OPR|Version)\/([\d.]+)/.exec(ua)?.[1] || ""; }
    else if (/SamsungBrowser/.test(ua)) { name = "Samsung Internet"; version = /SamsungBrowser\/([\d.]+)/.exec(ua)?.[1] || ""; }
    else if (/Firefox\//.test(ua)) { name = "Firefox"; version = /Firefox\/([\d.]+)/.exec(ua)?.[1] || ""; }
    else if (/Chrome\//.test(ua)) { name = "Chrome"; version = /Chrome\/([\d.]+)/.exec(ua)?.[1] || ""; }
    else if (/Safari\//.test(ua)) { name = "Safari"; version = /Version\/([\d.]+)/.exec(ua)?.[1] || ""; }
    return { name, version };
  },
  _timezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    } catch (_) {
      return "";
    }
  },
  _countryFromTimezone(tz) {
    if (!tz) return "";
    const map = {
      "Asia/Kolkata": "India",
      "Asia/Calcutta": "India",
      "Asia/Colombo": "Sri Lanka",
      "Asia/Dubai": "UAE",
      "Asia/Qatar": "Qatar",
      "Asia/Riyadh": "Saudi Arabia",
      "Asia/Kuwait": "Kuwait",
      "Asia/Singapore": "Singapore",
      "Asia/Kuala_Lumpur": "Malaysia",
      "Asia/Tokyo": "Japan",
      "Asia/Shanghai": "China",
      "Asia/Hong_Kong": "Hong Kong",
      "Asia/Bangkok": "Thailand",
      "Asia/Jakarta": "Indonesia",
      "Asia/Manila": "Philippines",
      "Asia/Karachi": "Pakistan",
      "Asia/Dhaka": "Bangladesh",
      "Asia/Kathmandu": "Nepal",
      "Australia/Sydney": "Australia",
      "Australia/Melbourne": "Australia",
      "Australia/Perth": "Australia",
      "Pacific/Auckland": "New Zealand",
      "Europe/London": "United Kingdom",
      "Europe/Dublin": "Ireland",
      "Europe/Paris": "France",
      "Europe/Berlin": "Germany",
      "Europe/Madrid": "Spain",
      "Europe/Rome": "Italy",
      "Europe/Amsterdam": "Netherlands",
      "Europe/Zurich": "Switzerland",
      "Europe/Stockholm": "Sweden",
      "Europe/Moscow": "Russia",
      "America/New_York": "USA",
      "America/Chicago": "USA",
      "America/Denver": "USA",
      "America/Los_Angeles": "USA",
      "America/Phoenix": "USA",
      "America/Toronto": "Canada",
      "America/Vancouver": "Canada",
      "America/Mexico_City": "Mexico",
      "America/Sao_Paulo": "Brazil",
      "America/Argentina/Buenos_Aires": "Argentina",
      "Africa/Johannesburg": "South Africa",
      "Africa/Cairo": "Egypt",
      "Africa/Nairobi": "Kenya",
      "Africa/Lagos": "Nigeria",
    };
    if (map[tz]) return map[tz];
    const region = tz.split("/")[0];
    const regionMap = {
      Asia: "Asia (unknown)",
      Europe: "Europe (unknown)",
      America: "Americas (unknown)",
      Africa: "Africa (unknown)",
      Australia: "Australia (unknown)",
      Pacific: "Pacific (unknown)",
    };
    return regionMap[region] || "";
  },
  _buildMetadata(browser) {
    const nav = navigator;
    return {
      browser: browser.name,
      browserVersion: browser.version,
      language: nav.language || "",
      languages: Array.isArray(nav.languages) ? nav.languages.slice(0, 5) : [],
      screen: `${screen.width}x${screen.height}`,
      viewport: `${window.innerWidth}x${window.innerHeight}`,
      devicePixelRatio: window.devicePixelRatio || 1,
      referrer: document.referrer || "",
      userAgentFull: nav.userAgent || "",
    };
  },
  async report() {
    try {
      if (this._isThrottled()) return; 
      await window.ConfigReady; 
      const endpoint = AppConfig.get("Supabase.Endpoint", "");
      const token = AppConfig.get("Supabase.Token", "");
      if (!endpoint || endpoint === "..." || !token || token === "...") {
        return;
      }
      const browser = this._detectBrowser();
      const tz = this._timezone();
      const payload = {
        user_guid: this.getOrCreateGuid(),
        device: this._detectDevice(),
        os: this._detectOS(),
        browser: browser.name,
        timezone: tz,
        country: this._countryFromTimezone(tz),
        origin_url: window.location.href,
        metadata: this._buildMetadata(browser),
        client_datetime: new Date().toISOString(),
      };
      const body = JSON.stringify(payload);
      await fetch(endpoint, {
        method: "POST",
        mode: "cors",
        keepalive: true,
        headers: {
          "Content-Type": "application/json",
          apikey: token,
          Authorization: `Bearer ${token}`,
        },
        body,
      });
      this._markSent();
    } catch (err) {
      console.debug("[VisitAnalytics] skipped:", err && err.message);
    }
  },
  init() {
    const start = () => {
      if ("requestIdleCallback" in window) {
        requestIdleCallback(() => this.report(), { timeout: 3000 });
      } else {
        setTimeout(() => this.report(), 1200);
      }
    };
    if (document.readyState === "complete") start();
    else window.addEventListener("load", start, { once: true });
  },
};
window.VisitAnalytics = VisitAnalytics;
VisitAnalytics.init();
</script>
